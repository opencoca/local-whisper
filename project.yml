# XcodeGen spec for the iOS / iPadOS app.
#
# Generates `TalkingMobile.xcodeproj`. Run via `make ios_xcode` (or
# `make ios` to also download the bundled Whisper model). The .xcodeproj
# itself is gitignored — this YAML is the source of truth.
#
# Why XcodeGen: contributors never have to resolve .pbxproj merge conflicts,
# and the project structure is reviewable in plain text instead of binary.

name: TalkingMobile

options:
  bundleIdPrefix: is.sage
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# WhisperKit is consumed as a local Swift package — the same Package.swift
# the macOS app builds against. One dependency, both platforms.
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.9.0

targets:
  TalkingMobile:
    type: application
    platform: iOS
    # Universal: iPhone + iPad share one binary. Stage Manager / split-view
    # on iPad gets the offline-dictation popover for free.
    supportedDestinations: [iOS, iPadOS]

    deploymentTarget: "17.0"

    # Shared Swift files (compiled into both macOS Package.swift and this
    # iOS target) live under Talking/. We explicitly list the iOS-safe
    # subset rather than pulling all of Talking/ — that's how we keep
    # AppKit/CGEvent files out of the iOS build.
    sources:
      - path: Talking/Mobile
        # Everything in Mobile/ is iOS-only by design.
      - path: Talking/Services/TranscriptionService.swift
      - path: Talking/Services/AudioCaptureService.swift
      - path: Talking/Services/LiveTranscriptionService.swift
      - path: Talking/Models/AudioData.swift
      - path: Talking/Models/TranscriptionState.swift

    dependencies:
      - package: WhisperKit
        product: WhisperKit

    # XcodeGen writes Info.plist from `properties` below. Don't hand-edit
    # the generated file — it gets clobbered every `make ios_xcode`. The
    # *source of truth* for plist content is this YAML.
    info:
      path: Talking/Mobile/Info.plist
      properties:
        CFBundleDisplayName: Talking
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "Used to record your voice for offline transcription. Audio never leaves your device."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        # Free Apple Developer Personal Team can't claim brand-aligned
        # bundle IDs that other developers may have registered. Using an
        # alexandersomma-owned namespace for dev testing. When we move to
        # a paid Developer Program under Sage.is, this becomes the final
        # bundle ID `is.sage.talking` (matches the macOS app per the
        # v1.2.0 rebrand).
        PRODUCT_BUNDLE_IDENTIFIER: com.alexandersomma.talking
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: "YES"
        # Apple Development team — Alexander Somma's Personal Team.
        # Free Apple ID provisioning: 7-day re-sign cycle, max 3 dev apps
        # per device, no TestFlight. Sufficient for direct-install testing.
        # Each contributor will need to override this with their own team
        # OR have access to a paid Developer Program account once we move
        # to TestFlight.
        DEVELOPMENT_TEAM: AV8MCSV43Z
        CODE_SIGN_STYLE: Automatic
