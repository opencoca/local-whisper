# XcodeGen spec for the iOS / iPadOS app.
#
# Generates `LocalWhisperMobile.xcodeproj`. Run via `make ios_xcode` (or
# `make ios` to also download the bundled Whisper model). The .xcodeproj
# itself is gitignored — this YAML is the source of truth.
#
# Why XcodeGen: contributors never have to resolve .pbxproj merge conflicts,
# and the project structure is reviewable in plain text instead of binary.

name: LocalWhisperMobile

options:
  bundleIdPrefix: com.localwhisper
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# WhisperKit is consumed as a local Swift package — the same Package.swift
# the macOS app builds against. One dependency, both platforms.
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.9.0

targets:
  LocalWhisperMobile:
    type: application
    platform: iOS
    # Universal: iPhone + iPad share one binary. Stage Manager / split-view
    # on iPad gets the offline-dictation popover for free.
    supportedDestinations: [iOS, iPadOS]

    deploymentTarget: "17.0"

    # Shared Swift files (compiled into both macOS Package.swift and this
    # iOS target) live under LocalWhisper/. We explicitly list the iOS-safe
    # subset rather than pulling all of LocalWhisper/ — that's how we keep
    # AppKit/CGEvent files out of the iOS build.
    sources:
      - path: LocalWhisper/Mobile
        # Everything in Mobile/ is iOS-only by design.
      - path: LocalWhisper/Services/TranscriptionService.swift
      - path: LocalWhisper/Services/AudioCaptureService.swift
      - path: LocalWhisper/Services/LiveTranscriptionService.swift
      - path: LocalWhisper/Models/AudioData.swift
      - path: LocalWhisper/Models/TranscriptionState.swift

    dependencies:
      - package: WhisperKit
        product: WhisperKit

    # XcodeGen writes Info.plist from `properties` below. Don't hand-edit
    # the generated file — it gets clobbered every `make ios_xcode`. The
    # *source of truth* for plist content is this YAML.
    info:
      path: LocalWhisper/Mobile/Info.plist
      properties:
        CFBundleDisplayName: LocalWhisper
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        NSMicrophoneUsageDescription: "Used to record your voice for offline transcription. Audio never leaves your device."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localwhisper.app
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: "YES"
